<g><rect x="520" y="850" width="560" height="85" rx="12" class="paper"/><text x="800" y="890" text-anchor="middle" class="note">Jennifer rides east through Five Oaks, crosses the creek, passes the old Patterson buildings,</text><text x="800" y="918" text-anchor="middle" class="note">then climbs the hillside to Waya and Tsula's camp.</text></g>
<g><text x="185" y="250" class="small">Kai &amp; Paloma (1918)</text><text x="210" y="220" class="small">Rhys &amp; Olivia</text><text x="270" y="190" class="small">Eli Cabin</text><text x="310" y="160" class="small">Wes &amp; Sami</text></g>
